name: Cloudflare Workers Preview

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/cloudflare-workers-preview.yml"
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  web-preview:
    name: Build and optionally deploy web worker preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @lucid/web build:pages

      - id: cloudflare_config
        name: Check Cloudflare deployment configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Cloudflare Workers preview deploy skipped. Add CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable previews."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Cloudflare Workers preview
        if: steps.cloudflare_config.outputs.enabled == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config apps/web/wrangler.jsonc --env preview
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
